name: Build Mi8 DTB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Install dependencies
      run: |
        sudo apt install -y build-essential bc bison flex libssl-dev device-tree-compiler gcc-aarch64-linux-gnu

    - name: Clone sdm845-mainline fork with Mi8 DTS
      run: |
        git clone --depth=1 -b add-xiaomi-ursa https://gitlab.com/krey_glsux2/sdm845-mainline.git kernel-src

    - name: Build Mi8 DTBs
      run: |
        cd kernel-src
        export CROSS_COMPILE=aarch64-linux-gnu-
        export ARCH=arm64
        make defconfig
        make -j$(nproc) qcom/sdm845-xiaomi-mi8-dipper.dtb qcom/sdm845-xiaomi-mi8-equuleus.dtb qcom/sdm845-xiaomi-mi8-ursa.dtb 2>&1 || true
        ls -la arch/arm64/boot/dts/qcom/sdm845-xiaomi-mi8-*.dtb 2>/dev/null

    - name: Upload DTB artifacts
      uses: actions/upload-artifact@v4
      with:
        name: mi8-dtbs
        path: kernel-src/arch/arm64/boot/dts/qcom/sdm845-xiaomi-mi8-*.dtb
        if-no-files-found: warn
