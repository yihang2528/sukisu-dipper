name: Build Mi8 Kernel + DTB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential bc bison flex libssl-dev libncurses5-dev           gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu cpio zstd git

    - name: Clone sdm845-mainline fork with Mi8 DTS
      run: |
        git clone --depth=1 -b add-xiaomi-ursa https://gitlab.com/krey_glsux2/sdm845-mainline.git kernel-src
        cd kernel-src

    - name: Configure kernel
      run: |
        cd kernel-src
        make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- defconfig

    - name: Build DTB only
      run: |
        cd kernel-src
        make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- -j$(nproc) dtbs

    - name: Extract Mi8 DTBs
      run: |
        mkdir -p artifacts
        cp kernel-src/arch/arm64/boot/dts/qcom/sdm845-xiaomi-mi8-dipper.dtb artifacts/
        cp kernel-src/arch/arm64/boot/dts/qcom/sdm845-xiaomi-mi8-equuleus.dtb artifacts/
        cp kernel-src/arch/arm64/boot/dts/qcom/sdm845-xiaomi-mi8-ursa.dtb artifacts/
        ls -la artifacts/

    - name: Upload DTB artifacts
      uses: actions/upload-artifact@v4
      with:
        name: mi8-dtbs
        path: artifacts/
