name: Build SukiSU-Ultra Kernel for Xiaomi Mi 8 (dipper)

env:
  # 小米8官方内核源码 (Android 9 / Pie, kernel 4.9.112)
  kernel_repository: MiCode/Xiaomi_Kernel_OpenSource
  kernel_branch: dipper-p-oss
  device: dipper
  defconfig: |
    dipper_user_defconfig
  kernel_patch: |
    backport-path-umount.patch
    allow-init-exec-ksud-under-nosuid.patch

on:
  workflow_dispatch:
    inputs:
      sukisu_tag:
        description: "SukiSU-Ultra tag/branch (default: main)"
        required: false
        default: "main"
      allow_rebuild:
        description: "Force rebuild"
        type: boolean
        default: true

jobs:
  build:
    name: Build kernel
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Set env
        run: |
          SUKISU_REF="${{ inputs.sukisu_tag || 'main' }}"
          echo sukisu_ref=$SUKISU_REF | tee -a $GITHUB_ENV

      - name: Install packages
        run: |
          sudo apt update
          sudo apt install -y \
            binutils-arm-linux-gnueabi \
            binutils-aarch64-linux-gnu \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            bc \
            bison \
            flex \
            libssl-dev \
            python3 \
            python2 \
            cpio

          # 4.9 内核脚本需要 python (python2)
          sudo ln -sf /usr/bin/python2 /usr/bin/python
          python --version

      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.kernel_repository }}
          ref: ${{ env.kernel_branch }}

      - name: Checkout this repo (patches + workflow)
        uses: actions/checkout@v4
        with:
          path: this-repo

      - name: Get kernel commit info
        run: |
          echo kernel_commit_id=$(git rev-parse --short HEAD) | tee -a $GITHUB_ENV
          echo kernel_version=$(make kernelversion 2>/dev/null || echo "4.9.112") | tee -a $GITHUB_ENV

      - name: Setup SukiSU-Ultra
        run: |
          # 使用 SukiSU-Ultra 的 setup.sh 集成到内核源码
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/${{ env.sukisu_ref }}/kernel/setup.sh" | bash -s ${{ env.sukisu_ref }}

          # 确认 SukiSU 已集成
          echo "=== SukiSU kernel dir ==="
          ls -la drivers/kernelsu/
          echo "=== SukiSU Kconfig ==="
          cat drivers/kernelsu/Kconfig || true

          # 添加 KPROBES 配置 (非 GKI 内核需要, SukiSU Kconfig 依赖 KPROBES && EXT4_FS)
          DEFCONFIG=arch/arm64/configs/${{ env.defconfig }}
          grep -q "CONFIG_KPROBES=y" $DEFCONFIG || echo 'CONFIG_KPROBES=y' >> $DEFCONFIG
          grep -q "CONFIG_HAVE_KPROBES=y" $DEFCONFIG || echo 'CONFIG_HAVE_KPROBES=y' >> $DEFCONFIG
          grep -q "CONFIG_KPROBE_EVENTS=y" $DEFCONFIG || echo 'CONFIG_KPROBE_EVENTS=y' >> $DEFCONFIG
          grep -q "CONFIG_KSU=y" $DEFCONFIG || echo 'CONFIG_KSU=y' >> $DEFCONFIG

          # GCC 11 兼容: aarch64 交叉编译器可能不支持 -fstack-protector-strong
          sed -i 's/CONFIG_CC_STACKPROTECTOR_STRONG=y/# CONFIG_CC_STACKPROTECTOR_STRONG is not set/' $DEFCONFIG
          sed -i 's/CONFIG_CC_STACKPROTECTOR=y/# CONFIG_CC_STACKPROTECTOR is not set/' $DEFCONFIG || true

      - name: Apply kernel patches
        run: |
          while read -r line; do
            if [ -z "$line" ] || [[ "$line" == "#"* ]]; then
              continue
            fi
            echo "Applying kernel patch: $line"
            # 容错: git apply → patch 命令 → 跳过
            git apply "this-repo/patches/$line" 2>/dev/null && echo "Applied with git apply" || {
              echo "git apply failed, trying patch command..."
              patch -p1 --forward < "this-repo/patches/$line" 2>/dev/null && echo "Applied with patch" || {
                echo "WARNING: Patch $line could not be applied cleanly, skipping"
              }
            }
          done <<<"$kernel_patch"

      - name: Patch Makefiles for GCC 11 compatibility
        run: |
          # 4.9 内核的 Makefile 和 scripts/Makefile.build 中有 -Werror 标志,
          # GCC 11 会产生 4.9 时代不存在的警告 (如 -Wattribute-alias),
          # -Werror 把这些警告变成错误导致编译失败.
          #
          # 修复策略:
          #   -Werror            → -Wno-error          (独立 -Werror, 全部警告不作为错误)
          #   -Werror=xxx        → -Wno-error=xxx      (等号形式)
          #   -Werror-xxx        → 不动! 这是 GCC 旧式写法 (-Werror-implicit-function-declaration)
          #                        GCC 不支持 -Wno-error-xxx 形式
          #
          # sed 模式: 只匹配 -Werror 后面是 空格/行尾/= 的情况
          #   -Werror($|[ =])  → 不行, sed 不支持 lookahead
          #   用两个 sed: 一个处理 -Werror=, 一个处理独立的 -Werror

          echo "=== Before patch ==="
          grep -n 'Werror' Makefile scripts/Makefile.build 2>/dev/null || echo "No -Werror found"

          # 处理 -Werror=xxx → -Wno-error=xxx
          sed -i 's/-Werror=/-Wno-error=/g' Makefile
          sed -i 's/-Werror=/-Wno-error=/g' scripts/Makefile.build

          # 处理独立的 -Werror (后面不是 - 或字母) → -Wno-error
          # 用 word boundary: -Werror 后面是空格/行尾/引号
          sed -i 's/-Werror\([^a-zA-Z=-]\)/-Wno-error\1/g' Makefile
          sed -i 's/-Werror\([^a-zA-Z=-]\)/-Wno-error\1/g' scripts/Makefile.build
          # 处理行尾的 -Werror
          sed -i 's/-Werror$/-Wno-error/g' Makefile
          sed -i 's/-Werror$/-Wno-error/g' scripts/Makefile.build

          echo "=== After patch ==="
          grep -n 'Werror\|Wno-error' Makefile scripts/Makefile.build 2>/dev/null || echo "No Werror flags found"

      - name: Build kernel
        run: |
          set -x

          # 4.9 内核在 GCC 11+ 上有多种兼容性问题, 一次性全部修复:
          # 1. -fno-common (GCC 10+): 修复 dtc yylloc 多重定义
          # 2. -Wno-attribute-alias: GCC 11 对 syscalls.h 的假警告, 内核的 "forbidden warning" 机制把它当错误
          # 3. -Wno-error: 作为双保险, 确保所有警告都不致命
          # 4. -Wno-address-of-packed-member: 部分结构体对齐警告
          # 5. -Wno-stringop-overflow: 误报
          CFLAGS_EXTRA="-fcommon -w"

          make O=out ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            HOSTCC=gcc \
            HOSTCFLAGS="-fcommon" \
            KCFLAGS="$CFLAGS_EXTRA" \
            ${{ env.defconfig }}

          echo "=== KSU config ==="
          grep -i "KSU\|KPROBES\|KPM" out/.config || true

          make O=out ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            HOSTCC=gcc \
            HOSTCFLAGS="-fcommon" \
            KCFLAGS="$CFLAGS_EXTRA" \
            -j$(nproc --all) 2>&1 | tail -120

          # 检查编译产物
          ls -la out/arch/arm64/boot/Image.gz-dtb || {
            echo "ERROR: Image.gz-dtb not found!"
            ls -la out/arch/arm64/boot/ || true
            exit 1
          }

      - name: Pack with AnyKernel3
        run: |
          curl -Lo AnyKernel3.zip https://github.com/osm0sis/AnyKernel3/archive/refs/heads/master.zip
          unzip AnyKernel3.zip

          cat > AnyKernel3-master/anykernel.sh <<EOF
          properties() { '
          kernel.string=SukiSU-Ultra (${{ env.sukisu_ref }}) for Xiaomi Mi 8 ($device)
          do.devicecheck=1
          do.modules=0
          do.cleanup=1
          do.cleanuponabort=1
          device.name1=$device
          device.name2=dipper
          device.name3=Mi8
          device.name4=Xiaomi_Mi_8
          '; }

          block=auto
          is_slot_device=auto
          ramdisk_compression=auto
          patch_vbmeta_flag=auto

          . tools/ak3-core.sh
          split_boot
          flash_boot
          EOF

          cp out/arch/arm64/boot/Image.gz-dtb AnyKernel3-master/
          if [ -f out/arch/arm64/boot/dtbo.img ]; then
            cp out/arch/arm64/boot/dtbo.img AnyKernel3-master/
          fi

          cd AnyKernel3-master
          rm -rf .git* README.md
          zip -r ../boot.zip *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SukiSU-dipper-boot
          path: boot.zip
          retention-days: 30

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: sukisu-${{ env.sukisu_ref }}-dipper-${{ env.kernel_commit_id }}
          body: |
            ## SukiSU-Ultra Kernel for Xiaomi Mi 8 (dipper)

            **Device:** Xiaomi Mi 8 (dipper)
            **Android:** 9 (Pie)
            **Kernel:** ${{ env.kernel_version }} (${{ env.kernel_commit_id }})
            **SukiSU-Ultra:** ${{ env.sukisu_ref }}

            ### Kernel Source
            https://github.com/${{ env.kernel_repository }}/tree/${{ env.kernel_branch }}

            ### SukiSU-Ultra
            https://github.com/SukiSU-Ultra/SukiSU-Ultra

            ### Installation
            1. Download `boot.zip`
            2. Flash via TWRP/OrangeFox recovery
            3. Install SukiSU-Ultra manager APK from [releases](https://github.com/SukiSU-Ultra/SukiSU-Ultra/releases)

            > ⚠️ Flash at your own risk. Make sure to have a backup of your stock boot.img.
          files: |
            boot.zip
